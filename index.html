<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Cobros</title>

  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
</head>
<body>

  <div class="app">

    <header class="topbar">
      <h1>Mis Cobros</h1>
      <p>Resumen semanal</p>
    </header>

    <section class="summary">
      <div class="card">
        <span>Total negocios</span>
        <h2 id="total-negocios">0</h2>
      </div>
      <div class="card">
        <span>Cobro semanal</span>
        <h2 id="total-semanal">$0</h2>
      </div>
      <div class="card">
        <span>Cobrado</span>
        <h2 id="total-cobrado">$0</h2>
      </div>
      <div class="card">
        <span>Pendiente</span>
        <h2 id="total-pendiente">$0</h2>
      </div>
    </section>

    <section class="payments">
      <div class="section-title">
        <h3>Cobros de esta semana</h3>
        <button id="add-business">+ Agregar</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="paid">Cobrados</button>
      </div>

      <input type="text" id="search-business" placeholder="Buscar negocio...">

      <div class="payment-card" data-monto="350">
        <img src="img/La Furia.jpeg">
        <div class="info">
          <h4>Furia</h4>
          <p>Domingo • $350</p>
        </div>
        <div class="actions">
          <span class="status paid">Cobrado</span>
          <button class="edit-btn">✎</button>
          <button class="delete-btn">✕</button>
        </div>
      </div>
    </section>

    <!-- MODAL -->
    <div class="modal" id="business-modal">
      <div class="modal-content">
        <h3>Nuevo negocio</h3>

        <input type="text" id="business-name" placeholder="Nombre del negocio">
        <input type="number" id="business-amount" placeholder="Monto semanal">

        <select id="business-day">
          <option value="">Día de cobro</option>
          <option>Lunes</option>
          <option>Martes</option>
          <option>Miércoles</option>
          <option>Jueves</option>
          <option>Viernes</option>
          <option>Sábado</option>
          <option>Domingo</option>
        </select>

        <input type="file" id="business-image" accept="image/*">

        <button id="save-business">Guardar</button>
        <button id="cancel-business" class="cancel-btn">Cancelar</button>
      </div>
    </div>

    <!-- HISTORIAL -->
    <section class="history-view" id="history-view" style="display:none;">
      <div class="section-title">
        <h3>Historial semanal</h3>
        <button id="back-home">Volver</button>
      </div>
      <div id="history-list"></div>
    </section>

    <!-- NAV -->
    <nav class="bottom-nav">
      <button>Inicio</button>
      <button>Cobros</button>
      <button>Negocios</button>
      <button id="save-history">Historial</button>
    </nav>

  </div>

  <script src="app.js"></script>

  <!-- SERVICE WORKER -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>

</body>
</html>
